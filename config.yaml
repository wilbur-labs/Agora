# Agora Configuration

models:
  claude:
    provider: anthropic
    api_key: ${CLAUDE_API_KEY}
    model: claude-sonnet-4-20250514
  gpt4o:
    provider: azure-openai
    api_key: ${AZURE_OPENAI_API_KEY}
    base_url: ${AZURE_OPENAI_BASE_URL}
    deployment: gpt-4o-0513
    api_version: "2024-12-01-preview"

council:
  default_agents: [scout, architect, critic]
  optional_agents: [sentinel]
  model: claude
  executor_model: claude
  concurrent: false
  workspace: ~/agora-workspace  # Executor creates files here

agents:
  scout:
    profile: scout.yaml
    model: claude
  architect:
    profile: architect.yaml
    model: claude
  critic:
    profile: critic.yaml
    model: claude
  sentinel:
    profile: sentinel.yaml
    model: claude

utility:
  model: claude

memory:
  enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  data_dir: ./data

skills:
  enabled: true
  paths:
    - ./skills/public
    - ./skills/learned
    - ./skills/custom

sandbox:
  enabled: false
  image: python:3.12-slim
  timeout: 120
  memory_limit: 512m
  cpu_limit: 1.0
  workspace_dir: /tmp/agora_workspace
  network: true

