# Agora Configuration

models:
  claude:
    provider: anthropic
    api_key: ${CLAUDE_API_KEY}
    model: claude-sonnet-4-20250514
  gpt4o:
    provider: azure-openai
    api_key: ${AZURE_OPENAI_API_KEY}
    base_url: ${AZURE_OPENAI_BASE_URL}
    deployment: gpt-4o
    api_version: "2024-12-01-preview"

council:
  default_agents: [scout, architect, critic]
  optional_agents: [sentinel]
  model: gpt4o
  executor_model: claude
  concurrent: false
  workspace: ~/agora-workspace  # Executor creates files here

projects:
  # Relative paths are anchored to the Agora repository root.
  registry_path: .agora/projects.yaml
  default: agora
  projects:
    agora:
      name: Agora
      root: .
      workspaces:
        codex: .agora/workspaces/codex
        claude: .agora/workspaces/claude
        kiro: .agora/workspaces/kiro

research:
  artifact_dir: .agora/research
  workspaces:
    codex: .agora/workspaces/codex
    claude: .agora/workspaces/claude
    kiro: .agora/workspaces/kiro
  dispatch:
    enabled: true
    timeout_seconds: 600
  workers:
    claude-research:
      enabled: true
      command: claude
      args: ["-p", "{prompt}", "--output-format", "text"]
      workspace_key: claude
    codex-engineering:
      enabled: true
      command: codex
      args: ["exec", "--skip-git-repo-check"]
      workspace_key: codex
    kiro-spec:
      enabled: true
      command: kiro-cli
      args: ["chat", "--no-interactive", "--trust-all-tools"]
      workspace_key: kiro

agents:
  scout:
    profile: scout.yaml
    model: gpt4o
  architect:
    profile: architect.yaml
    model: gpt4o
  critic:
    profile: critic.yaml
    model: gpt4o
  sentinel:
    profile: sentinel.yaml
    model: gpt4o

utility:
  model: gpt4o

memory:
  enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  data_dir: ./data

skills:
  enabled: true
  paths:
    - ./skills/public
    - ./skills/learned
    - ./skills/custom

sandbox:
  enabled: false
  image: python:3.12-slim
  timeout: 120
  memory_limit: 512m
  cpu_limit: 1.0
  workspace_dir: /tmp/agora_workspace
  network: true

# Network route for Agora's HTTP web tools.
# direct: ignore HTTP(S)_PROXY and use the external network directly.
# system: inherit proxy settings from the process environment.
web:
  network_mode: direct

# Durable delivery execution. Each adapter runs inside its registered project workspace.
execution:
  max_concurrent_global: 4
  max_concurrent_per_project: 2
  adapters:
    codex:
      enabled: true
      command: [codex, exec, --skip-git-repo-check, --sandbox, workspace-write, --ephemeral, "{prompt}"]
      workspace_key: codex
    claude:
      enabled: true
      command: [claude, -p, "{prompt}", --output-format, text, --permission-mode, auto, --no-session-persistence]
      workspace_key: claude
    kiro:
      enabled: true
      command: [kiro-cli, chat, --no-interactive, --trust-all-tools, "{prompt}"]
      workspace_key: kiro

