services:
  agora-api:
    container_name: agora
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./skills:/app/backend/skills
      - ./data:/app/backend/data
      - ./.agora:/app/.agora
      - ./agora-workspace:/root/agora-workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["uvicorn", "agora.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  agora-cli:
    build: .
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./skills:/app/backend/skills
      - ./data:/app/backend/data
      - ./.agora:/app/.agora
      - ./agora-workspace:/root/agora-workspace
    command: ["python", "-m", "agora"]
    stdin_open: true
    tty: true
    profiles:
      - cli
